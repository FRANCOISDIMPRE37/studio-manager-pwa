name: 🚀 Deploy to OVH VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy All Studios
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Mise à jour studio principal
            cd ~/app
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart studio-manager

            # Mise à jour de tous les clients dans /var/www/
            for dir in /var/www/*/; do
              if [ -f "$dir/package.json" ]; then
                name=$(basename $dir)
                echo "Mise à jour de $name..."
                cd $dir
                git pull origin main
                pnpm install --frozen-lockfile
                pnpm build
                pm2 restart $name || true
              fi
            done

            echo "✅ Tous les studios mis à jour !"
            pm2 status
